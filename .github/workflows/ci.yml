name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build Next.js
        run: npm run build
      - name: Smoke tests règles métier
        run: npx tsx lib/booking/rules.test.ts
